<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Evento</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-2xl mx-auto mt-10 bg-white shadow-lg rounded-2xl p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Cadastrar Evento</h1>

        <form method="POST" class="space-y-6">
            <div>
                <label for="data_evento" class="block text-sm font-medium text-gray-700 mb-2">
                    Data do Evento
                </label>
                <input
                    type="date"
                    id="data_evento"
                    name="data_evento"
                    required
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                >
            </div>

            <div>
                <label for="tipo_evento" class="block text-sm font-medium text-gray-700 mb-2">
                    Tipo do Evento
                </label>
                <select
                    id="tipo_evento"
                    name="tipo_evento"
                    required
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                >
                    <option value="">Selecione</option>
                    {% for tipo in tipos_evento %}
                        <option value="{{ tipo }}">{{ tipo }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex justify-end">
                <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg shadow"
                >
                    Salvar Evento
                </button>
            </div>
        </form>
    </div>
</body>
</html>
