<<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Atendimento - Defesa Civil</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">
  <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow">

    <!-- TOPO -->
    <div class="flex justify-end mb-4">
      <a href="{{ url_for('atendimentos') }}" class="text-sm text-gray-600 hover:text-blue-600">⬅ Voltar</a>
    </div>

    <!-- LOGOS -->
    <div class="flex justify-center items-center gap-6 mb-6">
      <img src="{{ url_for('static', filename='defesa_civil.jpeg') }}" alt="Defesa Civil" class="h-20">
      <img src="{{ url_for('static', filename='pref_cba.jpeg') }}" alt="Prefeitura de Cuiabá" class="h-20">
    </div>

    <!-- TÍTULO -->
    <h1 class="text-2xl font-bold text-blue-600 mb-6 text-center">✏️ Editar Atendimento</h1>

    <form method="POST" action="{{ url_for('salvar_edicao', numero_laudo_antigo=atendimento.numero_laudo | urlencode) }}"
          class="space-y-6">

      <!-- ── IDENTIFICAÇÃO ─────────────────────────────── -->
      <div>
        <h2 class="text-lg font-bold text-gray-700 border-b border-blue-400 pb-1 mb-4">Identificação</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div>
            <label class="font-semibold text-sm">Nº do Laudo</label>
            <input type="text" name="numero_laudo" value="{{ atendimento.numero_laudo }}"
              class="w-full border rounded px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>

          <div>
            <label class="font-semibold text-sm">Grau de Risco</label>
            <select name="grau_risco"
              class="w-full border rounded px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
              {% for opcao in ['MUITO BAIXO', 'BAIXO', 'MÉDIO', 'ALTO', 'MUITO ALTO'] %}
              <option value="{{ opcao }}" {{ 'selected' if atendimento.grau_risco == opcao }}>{{ opcao }}</option>
              {% endfor %}
            </select>
          </div>

        </div>
      </div>

      <!-- ── LOCALIZAÇÃO ────────────────────────────────── -->
      <div>
        <h2 class="text-lg font-bold text-gray-700 border-b border-blue-400 pb-1 mb-4">Localização</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div class="md:col-span-2">
            <label class="font-semibold text-sm">Bairro</label>
            <input type="text" name="bairro" value="{{ atendimento.bairro }}"
              class="w-full border rounded px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>

          <div>
            <label class="font-semibold text-sm">Latitude</label>
            <input type="text" name="latitude" value="{{ atendimento.latitude }}"
              placeholder="-15.5989"
              class="w-full border rounded px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>

          <div>
            <label class="font-semibold text-sm">Longitude</label>
            <input type="text" name="longitude" value="{{ atendimento.longitude }}"
              placeholder="-56.0949"
              class="w-full border rounded px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>

        </div>
      </div>

      <!-- ── DATA ──────────────────────────────────────── -->
      <div>
        <h2 class="text-lg font-bold text-gray-700 border-b border-blue-400 pb-1 mb-4">Data</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div>
            <label class="font-semibold text-sm">Data da Vistoria</label>
            <input type="text" name="data_vistoria" value="{{ atendimento.data_vistoria }}"
              placeholder="DD/MM/AAAA"
              class="w-full border rounded px-3 py-2 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>

        </div>
      </div>

      <!-- ── BOTÕES ─────────────────────────────────────── -->
      <div class="flex justify-center gap-4 pt-2">
        <a href="{{ url_for('atendimentos') }}"
           class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-2 rounded-lg">
          Cancelar
        </a>
        <button type="submit"
          class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-2 rounded-lg">
          💾 Salvar Alterações
        </button>
      </div>

    </form>
  </div>
</body>
</html>
