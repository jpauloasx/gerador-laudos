<div class="min-h-screen bg-gray-100 flex items-center justify-center p-6">

  <div class="bg-white shadow-xl rounded-xl w-full max-w-2xl p-8">

    <h2 class="text-2xl font-bold text-gray-700 mb-6 border-b pb-2">
      ✏️ Editar Atendimento
    </h2>

<form method="POST" action="{{ url_for('salvar_edicao', numero_laudo=atendimento.numero_laudo | urlencode) }}">

      <div class="grid md:grid-cols-2 gap-6">

        <!-- Bairro -->
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">
            Bairro
          </label>
          <input 
            type="text"
            name="bairro"
            value="{{ atendimento.bairro }}"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <!-- Grau de risco -->
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">
            Grau de Risco
          </label>
          <select
            name="grau_risco"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-red-500 focus:outline-none">

            <option {{ 'selected' if atendimento.grau_risco == 'MUITO BAIXO' }}>MUITO BAIXO</option>
            <option {{ 'selected' if atendimento.grau_risco == 'BAIXO' }}>BAIXO</option>
            <option {{ 'selected' if atendimento.grau_risco == 'MÉDIO' }}>MÉDIO</option>
            <option {{ 'selected' if atendimento.grau_risco == 'ALTO' }}>ALTO</option>
            <option {{ 'selected' if atendimento.grau_risco == 'MUITO ALTO' }}>MUITO ALTO</option>

          </select>
        </div>

        <!-- Latitude -->
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">
            Latitude
          </label>
          <input 
            type="text"
            name="latitude"
            value="{{ atendimento.latitude }}"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <!-- Longitude -->
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">
            Longitude
          </label>
          <input 
            type="text"
            name="longitude"
            value="{{ atendimento.longitude }}"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <!-- Data -->
        <div class="md:col-span-2">
          <label class="block text-sm font-semibold text-gray-600 mb-1">
            Data da Vistoria
          </label>
          <input 
            type="text"
            name="data_vistoria"
            value="{{ atendimento.data_vistoria }}"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

      </div>

      <!-- Botões -->
      <div class="flex justify-between items-center pt-4 border-t">

        <a href="{{ url_for('atendimentos') }}"
           class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium">
           ← Voltar
        </a>

        <button 
          type="submit"
          class="px-6 py-2 rounded-lg bg-green-600 hover:bg-green-700 text-white font-semibold shadow">
          💾 Salvar Alterações
        </button>

      </div>

    </form>

  </div>

</div>
