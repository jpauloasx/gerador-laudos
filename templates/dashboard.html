<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Defesa Civil Cuiabá</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">
  <div class="max-w-7xl mx-auto py-8 px-4">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <div class="flex items-center space-x-4">
        <img src="{{ url_for('static', filename='pref_cba.jpeg') }}" class="h-14 w-auto" alt="Prefeitura de Cuiabá">
        <img src="{{ url_for('static', filename='defesa_civil.jpeg') }}" class="h-14 w-auto" alt="Defesa Civil Cuiabá">
      </div>
      <a href="{{ url_for('home') }}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded shadow">
        ⬅️ Início
      </a>
    </div>

    <h1 class="text-3xl font-bold text-center text-orange-600 mb-10">📊 Dashboard de Atendimentos</h1>

    <!-- Painel de Resumo -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6 mb-8">
      <div class="bg-white shadow-md rounded-xl p-5 text-center">
        <h3 class="text-gray-600 text-sm">Total de Atendimentos</h3>
        <p id="totalAtendimentos" class="text-3xl font-bold text-blue-600 mt-2">0</p>
      </div>
      <div class="bg-white shadow-md rounded-xl p-5 text-center">
        <h3 class="text-gray-600 text-sm">Chuvas</h3>
        <p id="chuvasCount" class="text-3xl font-bold text-gray-600 mt-2">0</p>
      </div>
      <div class="bg-white shadow-md rounded-xl p-5 text-center">
        <h3 class="text-gray-600 text-sm">Regularização</h3>
        <p id="regularizacaoCount" class="text-3xl font-bold text-blue-600 mt-2">0</p>
      </div>
      <div class="bg-white shadow-md rounded-xl p-5 text-center">
        <h3 class="text-gray-600 text-sm">Incêndios</h3>
        <p id="incendiosCount" class="text-3xl font-bold text-red-600 mt-2">0</p>
      </div>
      <div class="bg-white shadow-md rounded-xl p-5 text-center">
        <h3 class="text-gray-600 text-sm">Movimento de Massa</h3>
        <p id="deslizamentosCount" class="text-3xl font-bold text-yellow-600 mt-2">0</p>
      </div>
    </div>

    <!-- Gráficos -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="bg-white shadow-lg rounded-xl p-6">
        <h2 class="text-xl font-semibold text-gray-700 mb-4">Distribuição por Tipo de Atendimento</h2>
        <canvas id="graficoTipo"></canvas>
      </div>

      <div class="bg-white shadow-lg rounded-xl p-6">
        <h2 class="text-xl font-semibold text-gray-700 mb-4">Distribuição por Grau de Risco</h2>
        <canvas id="graficoRisco"></canvas>
      </div>

      <!-- TABELA DE BAIRROS (substitui o gráfico de barras) -->
      <div class="bg-white shadow-lg rounded-xl p-6 lg:col-span-2">
        <h2 class="text-xl font-semibold text-gray-700 mb-4">Atendimentos por Bairro</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-sm text-left">
            <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
              <tr>
                <th class="px-5 py-3">Bairro</th>
                <th class="px-5 py-3 text-right">Nº de Atendimentos</th>
              </tr>
            </thead>
            <tbody id="tabelaBairros" class="divide-y divide-gray-100">
              <!-- preenchido via JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Script -->
  <script>
    async function carregarDashboard() {
      const res = await fetch("/painel_dados");
      const atendimentos = await res.json();

      // Função para normalizar texto (minúsculo + sem acento)
      function normalizarTexto(str) {
        return (str || "")
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, ""); // remove acentos
      }

      // Regras de agrupamento por tipo, ignorando acento / plural / variações
      const regrasTipo = {
        "Chuvas":              ["chuva", "chuvas"],
        "Regularização":       ["regularizacao", "regularização", "regularizacao fundiaria", "regularização fundiária"],
        "Incêndios":           ["incendio", "incêndio", "incendios", "incêndios"],
        "Movimento de Massa":  ["deslizamento", "deslizamentos", "movimento de massa", "movimentacao de massa", "movimentação de massa"]
      };

      // Totais gerais (cards)
      document.getElementById("totalAtendimentos").textContent = atendimentos.length;
      document.getElementById("chuvasCount").textContent =
        atendimentos.filter(a => regrasTipo["Chuvas"].some(alvo => normalizarTexto(a.origem).includes(alvo))).length;
      document.getElementById("regularizacaoCount").textContent =
        atendimentos.filter(a => regrasTipo["Regularização"].some(alvo => normalizarTexto(a.origem).includes(alvo))).length;
      document.getElementById("incendiosCount").textContent =
        atendimentos.filter(a => regrasTipo["Incêndios"].some(alvo => normalizarTexto(a.origem).includes(alvo))).length;
      document.getElementById("deslizamentosCount").textContent =
        atendimentos.filter(a => regrasTipo["Movimento de Massa"].some(alvo => normalizarTexto(a.origem).includes(alvo))).length;

      // Distribuição por tipo
      const tipos = ["Chuvas", "Regularização", "Incêndios", "Movimento de Massa"];

      const dadosTipo = tipos.map(tipo => {
        const alvos = regrasTipo[tipo].map(normalizarTexto);
        return atendimentos.filter(a => {
          const origemNorm = normalizarTexto(a.origem);
          return alvos.some(alvo => origemNorm.includes(alvo));
        }).length;
      });

      new Chart(document.getElementById("graficoTipo"), {
        type: "pie",
        data: {
          labels: tipos,
          datasets: [{
            data: dadosTipo,
            backgroundColor: ["#6b7280", "#3b82f6", "#ef4444", "#eab308"]
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: "bottom" } }
        }
      });

      // Distribuição por risco
      const riscos = ["MUITO BAIXO", "BAIXO", "MÉDIO", "ALTO", "MUITO ALTO"];
      const coresRisco = ["#86efac", "#22c55e", "#eab308", "#f97316", "#dc2626"];

      const dadosRisco = riscos.map(r => 
        atendimentos.filter(a => (a.grau_risco || "").toUpperCase().trim() === r).length
      );

      new Chart(document.getElementById("graficoRisco"), {
        type: "doughnut",
        data: {
          labels: riscos,
          datasets: [{
            data: dadosRisco,
            backgroundColor: coresRisco
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: "bottom" } }
        }
      });

      // Atendimentos por bairro → TABELA
      const bairros = {};
      atendimentos.forEach(a => {
        const b = a.bairro || "Não informado";
        bairros[b] = (bairros[b] || 0) + 1;
      });

      // Ordena do bairro com mais atendimentos para o com menos
      const bairrosOrdenados = Object.entries(bairros).sort((a, b) => b[1] - a[1]);

      const tbody = document.getElementById("tabelaBairros");
      tbody.innerHTML = "";

      if (bairrosOrdenados.length === 0) {
        tbody.innerHTML = `<tr><td colspan="2" class="px-5 py-4 text-center text-gray-400">Nenhum atendimento registrado.</td></tr>`;
      } else {
        bairrosOrdenados.forEach(([bairro, qtd]) => {
          const tr = document.createElement("tr");
          tr.className = "hover:bg-gray-50";
          tr.innerHTML = `
            <td class="px-5 py-3 font-medium text-gray-800">${bairro}</td>
            <td class="px-5 py-3 text-right text-gray-700">${qtd}</td>
          `;
          tbody.appendChild(tr);
        });
      }
    }

    carregarDashboard();
  </script>
</body>
</html>
